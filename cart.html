<!doctype html>
<html lang="zh-Hant-TW">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="光語心靈學苑購物車，檢視已選課程、音頻與年度工作坊。">
    <title>購物車｜光語心靈學苑</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="site-header">
      <div class="notice">2026 最新課程｜潛意識重塑工作坊開放報名</div>
      <div class="nav-shell">
        <a class="logo" href="index.html"><span class="logo-mark">光</span><span><strong>光語心靈學苑</strong><small>潛意識 × 冥想音頻</small></span></a>
        <button class="menu-toggle" type="button" aria-expanded="false" aria-controls="mainNav">選單</button>
        <nav class="main-nav" id="mainNav" aria-label="主選單">
          <a href="index.html">首頁</a>
          <a href="about.html">關於我</a>
          <a href="services.html">服務項目</a>
          <a href="courses.html">最新課程</a>
          <a href="teaching.html">教學</a>
          <a href="contact.html">聯絡我們</a>
        </nav>
        <div class="header-actions"><a class="cart-link is-active" href="cart.html">購物車 0</a><a class="login-link" href="contact.html">登入</a></div>
      </div>
    </header>

    <main>
      <section class="page-hero compact">
        <div class="container">
          <p class="eyebrow">Cart</p>
          <h1>購物車</h1>
          <p>確認你想購買的課程、音頻或年度工作坊，下一步即可填寫結帳資料。</p>
        </div>
      </section>

      <section class="section">
        <div class="container cart-layout">
          <div class="cart-panel">
            <div class="cart-heading">
              <h2>已選項目</h2>
              <button class="text-button danger" type="button" data-clear-cart>清空購物車</button>
            </div>
            <div id="cartItems" class="cart-items"></div>
          </div>

          <aside class="order-summary">
            <p class="eyebrow">Order Summary</p>
            <div class="summary-row"><span>商品原價</span><strong id="cartSubtotal">NT$ 0</strong></div>
            <div class="summary-row"><span>折扣</span><strong id="cartDiscount">NT$ 0</strong></div>
            <div class="summary-row total"><span>合計</span><strong id="cartTotal">NT$ 0</strong></div>
            <a class="button primary" href="checkout.html" id="checkoutLink">前往結帳</a>
            <a class="button secondary" href="courses.html">繼續選課</a>
          </aside>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container footer-grid">
        <div><strong>光語心靈學苑</strong><p>陪你透過潛意識、冥想與能量練習，找回穩定而豐盛的生活節奏。</p></div>
        <nav aria-label="頁尾選單"><a href="index.html">首頁</a><a href="about.html">關於我</a><a href="courses.html">最新課程</a><a href="contact.html">聯絡我們</a></nav>
      </div>
      <p class="copyright">Copyright © 2026 光語心靈學苑 保留一切權利。</p>
    </footer>
    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="script.js"></script>
  </body>
</html>
